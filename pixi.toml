[workspace]
name = "nf-fgsv"
channels = [
    "conda-forge",
    "bioconda",
    "nodefaults",
]
platforms = [
    "linux-64",
    "osx-arm64",
    "osx-64",
]

[activation.env]
# Ensure Nextflow and any JVM-based applications (e.g. fgbio-based JAR files)
# are using the JVM provided by the pixi environment
JAVA_HOME = "${PIXI_PROJECT_ROOT}/.pixi/envs/${PIXI_ENVIRONMENT_NAME}/lib/jvm"
PATH = "${PIXI_PROJECT_ROOT}/.pixi/envs/${PIXI_ENVIRONMENT_NAME}/lib/jvm/bin:$PATH"

[feature.nextflow.dependencies]
# This feature provides Nextflow, for executing the pipeline.
openjdk = "~=21.0"
nextflow = ">=26.04.0"

[feature.pytest_workflow.dependencies]
# This feature supports integration testing of the Nextflow workflow.
# Python and pytest are necessary to orchestrate testing via pytest-workflow.
python = ">=3.12.10,<3.13"
pytest = ">=8.3.5,<9"
pytest-workflow = ">=2.1.0,<3"

[feature.dev.dependencies]
# Python provides the interpreter that nf-docs (installed below from a git fork)
# runs on.
python = ">=3.12.10,<3.13"

[feature.dev.pypi-dependencies]
# nf-docs auto-generates the workflow documentation. Pinned to znorgaard's fork
# branch, which adds rendering support for Record-typed process outputs (not yet
# in the upstream bioconda release).
nf-docs = { git = "https://github.com/znorgaard/nf-docs.git", branch = "feat/typed-process-outputs" }

[environments]
default = { features = ["nextflow", "pytest_workflow", "dev"] }

[tasks]
# Run integration tests with the appropriate Nextflow profiles
wf-test = "pytest --git-aware --nf_profile 'docker' tests/integration/"
# Make it easier to run the Nextflow workflow
nf-workflow = "nextflow run main.nf"
# Lint every Nextflow source file in the project
lint = "nextflow lint main.nf modules/*.nf"
# Build the interactive HTML docs into _site/ (preview locally before pushing)
docs-html = "nf-docs generate . --format html --output _site"

